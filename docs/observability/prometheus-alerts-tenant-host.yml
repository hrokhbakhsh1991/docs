# Example Prometheus alerting rules — tenant host resolution.
# Wire into Alertmanager; link runbook: production-runbook.md §3.1

groups:
  - name: tour_ops_tenant_host
    rules:
      - alert: TenantHostUnknownSpike
        expr: |
          increase(tenant_resolution_failures_total{code="TENANT_HOST_UNKNOWN"}[5m]) > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Spike in unknown workspace host resolution
          description: |
            More than 50 TENANT_HOST_UNKNOWN failures in 5m. Check DNS, TENANT_ROOT_DOMAIN,
            and new tenant subdomain rows. Runbook: production-runbook.md §3.1

      - alert: TenantHostUnknownSecurityEvents
        expr: |
          increase(security_events_total{event="TENANT_HOST_UNKNOWN"}[5m]) > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Security metric spike for unknown tenant hosts
          description: Correlates with hostile or misconfigured Host headers at the edge.
