# Local HTTP smoke test for BFF-first ingress (no TLS). Used by scripts/verify-local-nginx-bff-boundary.mjs
server {
  listen 8888;
  server_name localhost;

  location / {
    return 200 "web-upstream\n";
    add_header Content-Type text/plain;
  }

  location /api/v2/ {
    return 403 "API is internal; use the web application.\n";
    add_header Content-Type text/plain;
  }
}
