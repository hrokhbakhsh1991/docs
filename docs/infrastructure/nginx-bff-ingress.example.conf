# Example ingress — browser traffic to Next.js BFF only (Infrastructure Closure Phase 6).
# Apply in staging/production after web/API upstreams are defined.

upstream tour_ops_web {
  server 127.0.0.1:3000;
}

# Internal only — not exposed on public listener
upstream tour_ops_api {
  server 127.0.0.1:3001;
}

server {
  listen 443 ssl http2;
  server_name *.app.example.com app.example.com;

  # Public: Next.js (includes /api/* BFF routes)
  location / {
    proxy_pass http://tour_ops_web;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header traceparent $http_traceparent;
  }

  # Block direct Nest API from browsers (BFF-first)
  location /api/v2/ {
    return 403 "API is internal; use the web application.";
  }
}

# Optional: internal mesh / ops tools reach API on a separate server block + mTLS.
