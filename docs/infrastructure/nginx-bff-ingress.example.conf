# =============================================================================
# Tour Ops — BFF-first public ingress (example)
# =============================================================================
#
# Copy to your nginx sites-available path, then customize placeholders below.
# Install helper: sudo bash infra/scripts/deploy-nginx-bff-ingress.sh
#
# Architecture (Phase 6 / Wave 3+):
#   - Browser traffic terminates here and proxies ONLY to the Next.js BFF.
#   - Direct public access to Nest `/api/v2/*` is blocked (403).
#   - Multi-tenant host routing relies on forwarded headers consumed by
#     `TenantHostResolverService` (Wave 3 custom domains + subdomain labels).
#
# Placeholders (replace before production):
#   __TENANT_ROOT_DOMAIN__     apex + wildcard tenant zone (e.g. app.example.com)
#   __TLS_CERT_PATH__          full-chain PEM for wildcard + apex
#   __TLS_KEY_PATH__           private key PEM
#   __WEB_UPSTREAM__           Next.js BFF host:port (default 127.0.0.1:3000)
#   __TRUSTED_PROXY_CIDRS__    CIDRs allowed to set X-Forwarded-* (align with API
#                              TRUSTED_PROXY_CIDRS / TRUST_PROXY_HOPS in .env)
#
# Payload boundaries:
#   - Server default 55M — batched tour gallery uploads (10 × 5MB + multipart overhead).
#   - Scoped 5M on BFF receipt route — synced with Nest ParseFilePipe (Task 5.3).
# =============================================================================

# WebSocket / SSE upgrade map — required for live dashboard push channels.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream tour_ops_web {
  # Replace with your Next.js service address (Compose service name, k8s svc, etc.).
  server __WEB_UPSTREAM__;
  keepalive 32;
}

# Internal upstream — NOT exposed on the public listener below.
upstream tour_ops_api {
  server 127.0.0.1:3001;
  keepalive 16;
}

# Optional: trust only ingress-adjacent hops when deriving client IP for logs/rate limits.
# Mirror these CIDRs in API TRUSTED_PROXY_CIDRS so X-Forwarded-Host is honored.
# set_real_ip_from __TRUSTED_PROXY_CIDRS__;
# real_ip_header X-Forwarded-For;
# real_ip_recursive on;

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name __TENANT_ROOT_DOMAIN__ *.__TENANT_ROOT_DOMAIN__;

  ssl_certificate     __TLS_CERT_PATH__;
  ssl_certificate_key __TLS_KEY_PATH__;

  # Hide nginx version in Server response headers (white-label / fingerprinting).
  server_tokens off;

  # Default envelope for BFF multipart (tour gallery: DENALI_MAX_PHOTO_COUNT × 5MB).
  client_max_body_size 55M;

  # Canonical request id for cross-service tracing (optional but recommended).
  proxy_set_header X-Request-Id $request_id;
  proxy_set_header traceparent $http_traceparent;

  # ---------------------------------------------------------------------------
  # Finance receipt upload (BFF) — strict 5M quarantine (Task 5.3 / Wave 5.3)
  # Browser path: POST /api/finance/payments/:paymentId/receipt
  # ---------------------------------------------------------------------------
  location ~ ^/api/finance/payments/[^/]+/receipt/?$ {
    client_max_body_size 5M;

    proxy_pass http://tour_ops_web;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
  }

  # ---------------------------------------------------------------------------
  # Public surface: Next.js BFF (includes /api/* route handlers)
  # ---------------------------------------------------------------------------
  location / {
    proxy_pass http://tour_ops_web;
    proxy_http_version 1.1;

    # Preserve the browser-visible host for tenant resolution (custom domains +
    # {slug}.__TENANT_ROOT_DOMAIN__ labels). API reads X-Forwarded-Host only when
    # TRUST_PROXY=true and remote IP is in TRUSTED_PROXY_CIDRS.
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;

    # WebSocket / long-lived push channels (dashboard live updates).
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
  }

  # ---------------------------------------------------------------------------
  # BFF-first guardrail: block direct Nest API from browsers
  # ---------------------------------------------------------------------------
  location /api/v2/ {
    return 403 "API is internal; use the web application.";
  }
}

# Optional HTTP → HTTPS redirect for the same tenant zone.
# server {
#   listen 80;
#   listen [::]:80;
#   server_name __TENANT_ROOT_DOMAIN__ *.__TENANT_ROOT_DOMAIN__;
#   return 301 https://$host$request_uri;
# }

# Optional: separate internal listener (mTLS / private network) for ops tools
# reaching tour_ops_api directly — never publish this block on the public internet.
