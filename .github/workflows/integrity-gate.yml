# Monorepo integrity gate — same hardened checks as local pre-commit (full-repo scope).
# Complements ui-integrity (web build/tokens) and architecture-guardrails (domain scripts).

name: integrity-gate

on:
  pull_request:

concurrency:
  group: integrity-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: CI integrity check (eslint, depcruise, test)
        run: bash scripts/ci-integrity-check.sh
