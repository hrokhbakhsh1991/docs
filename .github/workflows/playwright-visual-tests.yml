# Visual regression for UI Playground (Playwright screenshots).
# Upload artifacts include HTML report + test-results (diff / expected / actual on failure).

name: Playwright Visual Tests

on:
  pull_request:

concurrency:
  group: playwright-vrt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared UI package (types)
        run: pnpm --filter @tour/ui build

      - name: Build web app
        run: pnpm --dir apps/web run build

      - name: Build Telegram app
        run: pnpm --dir apps/telegram run build

      - name: Install Playwright Chromium + OS deps
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      # Smoke routes (/dashboard, /auth/login) — fail fast before snapshot-heavy VRT.
      - name: Run Playwright smoke tests
        working-directory: apps/web
        env:
          CI: true
        run: pnpm exec playwright test tests/smoke --reporter=list

      - name: Run Playwright Denali UX e2e tests
        working-directory: apps/web
        env:
          CI: true
          PW_BASE_URL: http://denali.localhost:3000
        run: pnpm exec playwright test tests/e2e --reporter=list

      - name: Run Playwright visual regression tests
        working-directory: apps/web
        env:
          CI: true
        run: pnpm exec playwright test tests/visual --reporter=html

      # Feature-level Playwright specs (no snapshots).
      - name: Run Playwright tours & bookings tests
        working-directory: apps/web
        env:
          CI: true
        run: pnpm exec playwright test tests/tours-crud.spec.ts tests/bookings.spec.ts --reporter=list

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/

      - name: Upload test results (screenshots / diffs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results/
