# MinIO API is published on host port 9002 by default (9000 is often taken locally).
# Set MINIO_API_PORT / apps/api MINIO_PORT to match; bucket `receipts` is ensured on API boot.
services:
  postgres:
    image: postgres:16
    container_name: tour-ops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tour_ops_dev
      POSTGRES_USER: tour_ops
      POSTGRES_PASSWORD: tour_ops
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tour-ops-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: tour-ops-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
