# Full stack: Postgres + Redis + Nest API + Next.js web (Docker images).
# Requires Compose Specification `include` (Docker Compose v2.20+).
#
# 1) bash infra/scripts/docker-bootstrap-env.sh
# 2) docker compose -f infra/docker-compose.full.yml up --build -d
#
# Web image is tenant-agnostic. Browser hits API on same host + port 3001 via NEXT_PUBLIC_API_DYNAMIC_ORIGIN;
# NEXT_PUBLIC_API_URL stays as SSR/build fallback to the API origin.

include:
  - path: docker-compose.yml
  - path: docker-compose.observability.yml

services:
  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - .env.docker
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_API_DYNAMIC_ORIGIN: "true"
        NEXT_PUBLIC_API_PORT: "3001"
        NEXT_PUBLIC_PAYMENT_PROVIDER: mock_provider
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      api:
        condition: service_healthy
